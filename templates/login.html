{% extends "base.html" %}
{% block title %}NexVault — Secure Login{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="glass-card login-card">
        <div class="card-corner-bl"></div>

        <div class="text-center">
            <div class="lock-icon">
                <div class="lock-body">
                    <div class="lock-shackle"></div>
                    <div class="lock-keyhole"></div>
                </div>
            </div>
            <p class="page-title">Secure Access</p>
            <p class="page-subtitle">Enter your credentials to proceed</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <span>⚠</span> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="account">Account Number</label>
                <div class="input-icon-wrap">
                    <span class="input-icon">◈</span>
                    <input type="text" id="account" name="account" class="form-input icon-pad"
                           placeholder="Enter your account number" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="pin">PIN</label>
                <div class="input-icon-wrap">
                    <span class="input-icon">⬡</span>
                    <input type="password" id="pin" name="pin" class="form-input icon-pad"
                           placeholder="Enter your PIN" required maxlength="6">
                </div>
                <div style="text-align: right; margin-top: 8px;">
                    <a href="/forget_pin" class="text-link">Forgot PIN?</a>
                </div>
            </div>

            <div class="pin-dots">
                <span class="pin-dot" id="d1"></span>
                <span class="pin-dot" id="d2"></span>
                <span class="pin-dot" id="d3"></span>
                <span class="pin-dot" id="d4"></span>
                <span class="pin-dot" id="d5"></span>
                <span class="pin-dot" id="d6"></span>
            </div>

            <button type="submit" class="btn-primary">
                Authenticate
            </button>
        </form>

        <div class="divider">NEW TO NEXVAULT</div>

        <div class="text-center">
            <a href="/register" class="btn-ghost" style="width: 100%; display: block; text-align: center;">
                Open an Account
            </a>
        </div>

        <div class="security-badge">
            <span class="security-icon">🔒</span>
            <span>256-bit SSL encrypted connection</span>
        </div>
    </div>
</div>

<style>
    .login-card {
        width: 100%;
        max-width: 440px;
    }

    /* Lock Icon */
    .lock-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: rgba(201,168,76,0.08);
        border: 1px solid rgba(201,168,76,0.2);
        margin: 0 auto 20px;
        position: relative;
        animation: lockPulse 3s ease-in-out infinite;
    }

    @keyframes lockPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.1); }
        50% { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
    }

    .lock-body {
        width: 22px;
        height: 18px;
        border-radius: 4px;
        border: 2px solid var(--gold);
        position: relative;
        margin-top: 8px;
    }

    .lock-shackle {
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        width: 12px;
        height: 10px;
        border: 2px solid var(--gold);
        border-bottom: none;
        border-radius: 6px 6px 0 0;
    }

    .lock-keyhole {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -45%);
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--gold);
    }

    .lock-keyhole::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 5px;
        background: var(--gold);
        border-radius: 1px;
    }

    /* Input with icon */
    .input-icon-wrap { position: relative; }

    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gold);
        font-size: 0.9rem;
        z-index: 1;
        pointer-events: none;
        opacity: 0.6;
    }

    .icon-pad { padding-left: 42px !important; }

    /* PIN dots */
    .pin-dots {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: -8px 0 20px;
    }

    .pin-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1px solid rgba(201,168,76,0.3);
        background: transparent;
        transition: all 0.2s ease;
    }

    .pin-dot.active {
        background: var(--gold);
        border-color: var(--gold);
        box-shadow: 0 0 8px rgba(201,168,76,0.5);
    }

    .security-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 24px;
        padding: 10px;
        background: rgba(76,175,130,0.05);
        border: 1px solid rgba(76,175,130,0.15);
        border-radius: 8px;
        font-size: 0.72rem;
        color: var(--text-muted);
        letter-spacing: 0.5px;
    }
</style>

<script>
    const pinInput = document.getElementById('pin');
    const dots = document.querySelectorAll('.pin-dot');

    pinInput.addEventListener('input', () => {
        const len = pinInput.value.length;
        dots.forEach((d, i) => {
            d.classList.toggle('active', i < len);
        });
    });
</script>
{% endblock %}
